name: Changelog Refresh

on:
  schedule:
    - cron: '0 3 * * 1'  # Every Monday 03:00 UTC (after upstream-sync at 02:00)
  workflow_dispatch:
    inputs:
      since:
        description: "Git --since value (e.g. '1 month ago', 'v1.5.0')"
        required: false
        default: "1 month ago"

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh-changelog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Regenerate CHANGELOG.md
        run: python scripts/generate_changelog.py --since "${{ github.event.inputs.since || '1 month ago' }}" --output CHANGELOG.md

      - name: Detect changes
        id: diff
        run: |
          if git diff --quiet CHANGELOG.md; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Open PR with refreshed changelog
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: refresh CHANGELOG from recent commits"
          title: "chore: refresh CHANGELOG.md"
          body: |
            Auto-generated by `scripts/generate_changelog.py` covering commits since `${{ github.event.inputs.since || '1 month ago' }}`.

            Review the diff before merging — if any category (Added/Changed/Fixed) looks misclassified, edit the file on this branch.
          branch: chore/changelog-refresh
          delete-branch: true
          labels: auto-sync,changelog
          add-paths: CHANGELOG.md
