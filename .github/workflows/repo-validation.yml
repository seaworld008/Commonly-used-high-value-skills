name: Repository Validation

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install test dependency
        run: python -m pip install pyyaml

      - name: Lint skill quality
        run: python scripts/lint_skill_quality.py --min-lines 50

      - name: Audit external skill licenses
        run: python scripts/audit_licenses.py

      - name: Refresh generated repository views
        run: python scripts/refresh_repo_views.py

      - name: Generate tags index
        run: python scripts/generate_tags_index.py

      - name: Build catalog JSON
        run: python scripts/build_catalog_json.py

      - name: Generate repo health report
        run: python scripts/generate_repo_health_report.py

      - name: Run repository validation tests
        run: >
          python -m unittest
          tests.test_generate_repo_health_report
          tests.test_export_openclaw_skills
          tests.test_finance_investing_skills
          tests.test_generate_category_readmes
          tests.test_normalize_codex_skills
          tests.test_refresh_repo_views
          tests.test_repo_skill_compatibility
          tests.test_repo_validation_workflow
          -v

      - name: Ensure generated files are up to date
        run: git diff --exit-code

      - name: Upload repo health artifact
        uses: actions/upload-artifact@v4
        with:
          name: repo-health-report
          path: |
            docs/sources/reports/repo-health.json
            docs/sources/reports/repo-health.md
          retention-days: 30
